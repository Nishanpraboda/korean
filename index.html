<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Study Master</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f2f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #app-container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 2;
        }
        h2 { color: #2d3436; margin-top: 0; margin-bottom: 25px; }
        
        /* Menu Buttons */
        .menu-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        .menu-btn:active { transform: scale(0.98); }
        
        /* Study Page */
        .card { display: none; }
        .display-box {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px dashed #ddd;
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 20px;
            background-color: #fafafa;
        }
        #main-display { font-size: 60px; font-weight: bold; margin: 0; color: #2d3436; }
        #answer-display { 
            font-size: 22px; 
            color: var(--secondary); 
            font-weight: 500; 
            margin-top: 15px; 
            line-height: 1.5;
        }
        
        .next-btn { 
            background: var(--secondary); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            width: 100%; 
        }
        .back-btn { 
            background: transparent; 
            color: #636e72; 
            border: none; 
            padding: 10px; 
            cursor: pointer; 
            margin-top: 15px; 
            text-decoration: underline;
        }

        /* Watermark - Korean with leen thilina */
        .watermark {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #b2bec3;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="menu-page">
        <h2>Korean Master</h2>
        <button class="menu-btn" onclick="startApp('time')">වෙලාව කියවමු (Time)</button>
        <button class="menu-btn" onclick="startApp('native')">ගණන් කරමු (Native Korean)</button>
        <button class="menu-btn" onclick="startApp('sino')">අංක සහ ඉලක්කම් (Sino Korean)</button>
    </div>

    <div id="study-page" class="card">
        <h3 id="mode-title" style="color:var(--primary); margin-top:0;">Mode</h3>
        <div class="display-box" onclick="showAnswer()">
            <div id="main-display">?</div>
            <div id="answer-display">ටච් කරන්න</div>
        </div>
        <button class="next-btn" onclick="generateQuestion()">ඊළඟ එක</button>
        <button class="back-btn" onclick="showMenu()">ප්‍රධාන මෙනුවට</button>
    </div>
</div>

<div class="watermark">Korean with leen thilina</div>

<script>
    let currentMode = '';
    let currentAnswer = '';

    const data = {
        native: [
            {n: "1", k: "하나 (Hana)"}, {n: "2", k: "둘 (Dul)"}, {n: "3", k: "셋 (Set)"},
            {n: "4", k: "넷 (Net)"}, {n: "5", k: "다섯 (Daseot)"}, {n: "6", k: "여섯 (Yeoseot)"},
            {n: "7", k: "일곱 (Ilgop)"}, {n: "8", k: "여덟 (Yeodeol)"}, {n: "9", k: "아홉 (Ahop)"}, {n: "10", k: "열 (Yeol)"}
        ],
        sino: [
            {n: "1", k: "일 (Il)"}, {n: "2", k: "이 (I)"}, {n: "3", k: "삼 (Sam)"},
            {n: "4", k: "사 (Sa)"}, {n: "5", k: "오 (O)"}, {n: "6", k: "육 (Yuk)"},
            {n: "7", k: "칠 (Chil)"}, {n: "8", k: "팔 (Pal)"}, {n: "9", k: "구 (Gu)"}, {n: "10", k: "십 (Sip)"}
        ],
        // Time Data
        hNative: ["", "한", "두", "세", "네", "다섯", "여섯", "일곱", "여덟", "아홉", "열", "열한", "열두"],
        hEng: ["", "Han", "Du", "Se", "Ne", "Daseot", "Yeoseot", "Ilgop", "Yeodeol", "Ahop", "Yeol", "Yeol-han", "Yeol-du"],
        mSino: {
            10: {k: "십", e: "sip"}, 20: {k: "이십", e: "i-sip"}, 30: {k: "삼십", e: "sam-sip"},
            40: {k: "사십", e: "sa-sip"}, 50: {k: "오십", e: "o-sip"}
        }
    };

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('study-page').style.display = 'block';
        
        let titles = { 
            'time': 'වෙලාව කියවමු', 
            'native': 'Native Korean (1-10)', 
            'sino': 'Sino Korean (1-10)' 
        };
        document.getElementById('mode-title').innerText = titles[mode];
        generateQuestion();
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('study-page').style.display = 'none';
    }

    function generateQuestion() {
        let display = document.getElementById('main-display');
        document.getElementById('answer-display').innerText = "ටච් කරන්න";
        document.getElementById('answer-display').style.color = "#b2bec3";

        if (currentMode === 'native' || currentMode === 'sino') {
            let list = data[currentMode];
            let item = list[Math.floor(Math.random() * list.length)];
            display.innerText = item.n;
            currentAnswer = item.k;
        } 
        else if (currentMode === 'time') {
            let hour = Math.floor(Math.random() * 12) + 1;
            let minute = Math.floor(Math.random() * 6) * 10;
            display.innerText = `${hour}:${minute === 0 ? '00' : minute}`;
            
            let korPart = data.hNative[hour] + " 시";
            let engPart = data.hEng[hour] + " si";

            if (minute === 30) {
                korPart += " 반";
                engPart += " ban";
            } else if (minute !== 0) {
                korPart += " " + data.mSino[minute].k + " 분";
                engPart += " " + data.mSino[minute].e + " bun";
            }

            // එක දිගට කොරියන් අකුරු සහ වරහන් ඇතුළේ ඉංග්‍රීසි උච්චාරණය
            currentAnswer = korPart + "<br>(" + engPart + ")";
        }
    }

    function showAnswer() {
        document.getElementById('answer-display').innerHTML = currentAnswer;
        document.getElementById('answer-display').style.color = "var(--secondary)";
    }
</script>

</body>
</html>
