<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Study Master</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f2f5;
            --text-main: #2d3436;
            --card-bg: white;
            --dashed-border: #ddd;
            --toggle-bg: #ccc;
            --toggle-active: #fff;
            
            --color-time: #6c5ce7;
            --color-pure: #0984e3;
            --color-sino: #e84393;
            --color-days: #e67e22;
            --color-math: #27ae60;
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --text-main: #f0f2f5;
            --card-bg: #16213e;
            --dashed-border: #444;
            --toggle-bg: #34495e;
            --toggle-active: #1a1a2e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: 0.5s ease;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #app-container {
            width: 85%; max-width: 380px; background-color: var(--card-bg);
            padding: 35px 25px; border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); text-align: center;
            position: relative;
        }

        .menu-btn {
            display: block; width: 100%; padding: 18px; margin: 12px 0; border: none;
            border-radius: 15px; color: white; font-size: 17px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .menu-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        .menu-btn:active { transform: scale(0.95); }
        
        #btn-time { background: var(--color-time); }
        #btn-pure { background: var(--color-pure); }
        #btn-sino { background: var(--color-sino); }
        #btn-days { background: var(--color-days); }
        #btn-math { background: var(--color-math); }

        .card { display: none; }
        
        .display-box {
            min-height: 220px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            border: 2px dashed var(--dashed-border); border-radius: 20px;
            margin-bottom: 25px; transition: 0.3s; padding: 15px;
        }

        #main-display { font-size: 36px; font-weight: bold; color: var(--text-main); line-height: 1.3; margin-bottom: 10px; }
        #secondary-display { font-size: 24px; color: var(--primary); font-weight: bold; min-height: 30px; opacity: 0; transition: 0.3s; }
        #answer-display { font-size: 22px; color: var(--secondary); font-weight: 600; margin-top: 15px; opacity: 0; transition: 0.3s; }
        
        .next-btn { background: var(--secondary); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: bold; width: 100%; cursor: pointer; }
        .back-btn { background: transparent; color: var(--text-main); border: none; padding: 10px; cursor: pointer; margin-top: 15px; text-decoration: underline; font-size: 14px; opacity: 0.7; }

        .switch { position: absolute; top: 20px; right: 20px; display: inline-block; width: 55px; height: 30px; z-index: 1001; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--toggle-bg); transition: .4s; border-radius: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: var(--toggle-active); transition: .4s; border-radius: 50%; z-index: 2; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(25px); }

        .watermark { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 11px; color: var(--text-main); opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

<label class="switch">
    <input type="checkbox" id="theme-checkbox">
    <span class="slider">
        <span style="font-size:12px">☀️</span>
        <span style="font-size:12px">🌙</span>
    </span>
</label>

<div id="app-container" class="fade-in">
    <div id="menu-page">
        <button class="menu-btn" id="btn-time" onclick="startApp('time')">වෙලාව (Time)</button>
        <button class="menu-btn" id="btn-pure" onclick="startApp('pure')">Pure Korean අංක</button>
        <button class="menu-btn" id="btn-sino" onclick="startApp('sino')">Sino Korean අංක</button>
        <button class="menu-btn" id="btn-days" onclick="startApp('days')">සතියේ දවස් (Days)</button>
        <button class="menu-btn" id="btn-math" onclick="startApp('math')">සරල ගණිතය (Math)</button>
    </div>

    <div id="study-page" class="card">
        <h3 id="mode-title" style="margin: 0 0 20px 0;">Mode</h3>
        <div class="display-box" id="card-box" onclick="handleBoxClick()">
            <div id="main-display">?</div>
            <div id="secondary-display"></div>
            <div id="answer-display">ටච් කරන්න</div>
        </div>
        <button class="next-btn" onclick="generateQuestion()">ඊළඟ එක</button>
        <button class="back-btn" onclick="showMenu()">ප්‍රධාන මෙනුවට</button>
    </div>
</div>

<div class="watermark">KOREAN WITH LEEN THILINA</div>

<script>
    let currentMode = '';
    let currentAnswer = '';
    let currentSecondary = '';
    let clickStep = 0;

    const sinoMap = { 0:"공", 1:"일", 2:"이", 3:"삼", 4:"사", 5:"오", 6:"육", 7:"칠", 8:"팔", 9:"구", 10:"십" };

    function getSino(num) {
        if (num <= 10) return sinoMap[num];
        if (num < 100) {
            let tens = Math.floor(num / 10);
            let ones = num % 10;
            let res = (tens === 1 ? "" : sinoMap[tens]) + "십";
            if (ones !== 0) res += sinoMap[ones];
            return res;
        }
        return num;
    }

    const data = {
        pure: [ {n: "1", k: "하나 (Hana)"}, {n: "2", k: "둘 (Dul)"}, {n: "3", k: "셋 (Set)"}, {n: "4", k: "넷 (Net)"}, {n: "5", k: "다섯 (Daseot)"}, {n: "6", k: "여섯 (Yeoseot)"}, {n: "7", k: "일곱 (Ilgop)"}, {n: "8", k: "여덟 (Yeodeol)"}, {n: "9", k: "아홉 (Ahop)"}, {n: "10", k: "열 (Yeol)"} ],
        sino: [ {n: "1", k: "일 (Il)"}, {n: "2", k: "이 (I)"}, {n: "3", k: "삼 (Sam)"}, {n: "4", k: "사 (Sa)"}, {n: "5", k: "오 (O)"}, {n: "6", k: "육 (Yuk)"}, {n: "7", k: "칠 (Chil)"}, {n: "8", k: "팔 (Pal)"}, {n: "9", k: "구 (Gu)"}, {n: "10", k: "십 (Sip)"} ],
        days: [ {n: "ඉරිදා", k: "일요일 (Iryoil)"}, {n: "සඳුදා", k: "월요일 (Woryoil)"}, {n: "අඟහරුවාදා", k: "화요일 (Hwayoil)"}, {n: "බදාදා", k: "수요일 (Suyoil)"}, {n: "බ්‍රහස්පතින්දා", k: "목요일 (Mogyoil)"}, {n: "සිකුරාදා", k: "금요일 (Geumyoil)"}, {n: "සෙනසුරාදා", k: "토요일 (Toyoil)"} ],
        hNative: ["", "한", "두", "세", "네", "다섯", "여섯", "일곱", "여덟", "아홉", "열", "열한", "열두"]
    };

    function startApp(mode) {
        currentMode = mode;
        const colors = { 'time': 'var(--color-time)', 'pure': 'var(--color-pure)', 'sino': 'var(--color-sino)', 'days': 'var(--color-days)', 'math': 'var(--color-math)' };
        const titles = { 'time': 'TIME', 'pure': 'PURE KOREAN', 'sino': 'SINO KOREAN', 'days': 'DAYS', 'math': 'MATH STUDY' };
        document.getElementById('mode-title').innerText = titles[mode];
        document.getElementById('mode-title').style.color = colors[mode];
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('study-page').style.display = 'block';
        generateQuestion();
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('study-page').style.display = 'none';
    }

    function generateQuestion() {
        clickStep = 0;
        const display = document.getElementById('main-display');
        const secondaryDisplay = document.getElementById('secondary-display');
        const answerBox = document.getElementById('answer-display');
        
        secondaryDisplay.style.opacity = "0";
        answerBox.style.opacity = "0";

        if (currentMode === 'math') {
            let a, b, op, result;
            op = Math.random() > 0.5 ? '+' : '-';

            if (op === '+') {
                a = Math.floor(Math.random() * 20) + 1;
                b = Math.floor(Math.random() * 10) + 1;
            } else {
                let tens = [10, 20, 30, 40, 50];
                a = tens[Math.floor(Math.random() * tens.length)];
                b = Math.floor(Math.random() * 9) + 1;
            }
            
            result = op === '+' ? a + b : a - b;
            display.innerText = `${getSino(a)} ${op === '+' ? '더하기' : '빼기'} ${getSino(b)}`;
            display.style.fontSize = "30px";
            currentSecondary = `(${a} ${op} ${b})`;
            currentAnswer = `${getSino(result)} (${result})`;
        } else if (currentMode === 'time') {
            display.style.fontSize = "50px";
            let h = Math.floor(Math.random()*12)+1;
            let m = Math.floor(Math.random()*6)*10;
            display.innerText = `${h}:${m===0?'00':m}`;
            currentAnswer = data.hNative[h] + " 시" + (m !== 0 ? " " + getSino(m) + " 분" : "");
        } else {
            display.style.fontSize = "50px";
            let item = data[currentMode][Math.floor(Math.random() * data[currentMode].length)];
            display.innerText = item.n;
            currentAnswer = item.k;
        }
    }

    function handleBoxClick() {
        const secondaryDisplay = document.getElementById('secondary-display');
        const answerBox = document.getElementById('answer-display');

        if (currentMode === 'math') {
            if (clickStep === 0) {
                secondaryDisplay.innerText = currentSecondary;
                secondaryDisplay.style.opacity = "1";
                clickStep = 1;
            } else if (clickStep === 1) {
                answerBox.innerHTML = currentAnswer;
                answerBox.style.opacity = "1";
                clickStep = 2;
            }
        } else {
            answerBox.innerHTML = currentAnswer;
            answerBox.style.opacity = "1";
        }
    }

    document.getElementById('theme-checkbox').addEventListener('change', (e) => {
        document.body.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
    });
</script>
</body>
</html>
