<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Study App</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f2f5;
        }
        
        /* අලුත් ෆොටෝ ලින්ක් එක මෙතන තියෙනවා */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #2d3436 url('https://upload.wikimedia.org/wikipedia/commons/thumb/d/de/Gyeongbokgung_Palace_at_Night.jpg/1200px-Gyeongbokgung_Palace_at_Night.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Overlay එක */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(4px);
            z-index: 1;
        }

        #app-container {
            width: 85%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
            transition: 0.3s;
        }
        .menu-btn:active { transform: scale(0.96); }
        
        .card { display: none; }
        
        .display-box {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px dashed #ccc;
            border-radius: 20px;
            margin-bottom: 25px;
            background: white;
        }
        
        #main-display { font-size: 60px; font-weight: bold; color: #2d3436; }
        #answer-display { 
            font-size: 24px; color: var(--secondary); font-weight: 600; 
            margin-top: 15px; line-height: 1.4;
        }
        
        .next-btn { 
            background: var(--secondary); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-size: 17px; 
            font-weight: bold; cursor: pointer; width: 100%; 
        }
        .back-btn { 
            background: transparent; color: #636e72; border: none; 
            padding: 10px; cursor: pointer; margin-top: 15px; 
            text-decoration: underline;
        }

        .watermark {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="menu-page">
        <button class="menu-btn" onclick="startApp('time')">වෙලාව කියවමු (Time)</button>
        <button class="menu-btn" onclick="startApp('native')">ගණන් කරමු (Native Korean)</button>
        <button class="menu-btn" onclick="startApp('sino')">අංක සහ ඉලක්කම් (Sino Korean)</button>
    </div>

    <div id="study-page" class="card">
        <h3 id="mode-title" style="color:var(--primary); margin: 0 0 20px 0;">Mode</h3>
        <div class="display-box" onclick="showAnswer()">
            <div id="main-display">?</div>
            <div id="answer-display">ටච් කරන්න</div>
        </div>
        <button class="next-btn" onclick="generateQuestion()">ඊළඟ එක</button>
        <button class="back-btn" onclick="showMenu()">ප්‍රධාන මෙනුවට</button>
    </div>
</div>

<div class="watermark">Korean with leen thilina</div>

<script>
    let currentMode = '';
    let currentAnswer = '';

    const data = {
        native: [
            {n: "1", k: "하나 (Hana)"}, {n: "2", k: "둘 (Dul)"}, {n: "3", k: "셋 (Set)"},
            {n: "4", k: "넷 (Net)"}, {n: "5", k: "다섯 (Daseot)"}, {n: "6", k: "여섯 (Yeoseot)"},
            {n: "7", k: "일곱 (Ilgop)"}, {n: "8", k: "여덟 (Yeodeol)"}, {n: "9", k: "아홉 (Ahop)"}, {n: "10", k: "열 (Yeol)"}
        ],
        sino: [
            {n: "1", k: "일 (Il)"}, {n: "2", k: "이 (I)"}, {n: "3", k: "삼 (Sam)"},
            {n: "4", k: "사 (Sa)"}, {n: "5", k: "오 (O)"}, {n: "6", k: "육 (Yuk)"},
            {n: "7", k: "칠 (Chil)"}, {n: "8", k: "팔 (Pal)"}, {n: "9", k: "구 (Gu)"}, {n: "10", k: "십 (Sip)"}
        ],
        hNative: ["", "한", "두", "세", "네", "다섯", "여섯", "일곱", "여덟", "아홉", "열", "열한", "열두"],
        hEng: ["", "Han", "Du", "Se", "Ne", "Daseot", "Yeoseot", "Ilgop", "Yeodeol", "Ahop", "Yeol", "Yeol-han", "Yeol-du"],
        mSino: {
            10: {k: "십", e: "sip"}, 20: {k: "이십", e: "i-sip"}, 30: {k: "삼십", e: "sam-sip"},
            40: {k: "사십", e: "sa-sip"}, 50: {k: "오십", e: "o-sip"}
        }
    };

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('study-page').style.display = 'block';
        let titles = { 'time': 'වෙලාව කියවමු', 'native': 'Native Korean', 'sino': 'Sino Korean' };
        document.getElementById('mode-title').innerText = titles[mode];
        generateQuestion();
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('study-page').style.display = 'none';
    }

    function generateQuestion() {
        let display = document.getElementById('main-display');
        document.getElementById('answer-display').innerText = "ටච් කරන්න";
        document.getElementById('answer-display').style.color = "#b2bec3";

        if (currentMode === 'native' || currentMode === 'sino') {
            let list = data[currentMode];
            let item = list[Math.floor(Math.random() * list.length)];
            display.innerText = item.n;
            currentAnswer = item.k;
        } 
        else if (currentMode === 'time') {
            let hour = Math.floor(Math.random() * 12) + 1;
            let minute = Math.floor(Math.random() * 6) * 10;
            display.innerText = `${hour}:${minute === 0 ? '00' : minute}`;
            
            let korPart = data.hNative[hour] + " 시";
            let engPart = data.hEng[hour] + " si";

            if (minute === 30) {
                korPart += " 반";
                engPart += " ban";
            } else if (minute !== 0) {
                korPart += " " + data.mSino[minute].k + " 분";
                engPart += " " + data.mSino[minute].e + " bun";
            }
            currentAnswer = korPart + "<br>(" + engPart + ")";
        }
    }

    function showAnswer() {
        document.getElementById('answer-display').innerHTML = currentAnswer;
        document.getElementById('answer-display').style.color = "var(--secondary)";
    }
</script>
</body>
</html>
