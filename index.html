<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Study Master</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f2f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app-container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .card { display: none; }
        .display-box {
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px dashed #ddd;
            border-radius: 15px;
            margin-bottom: 20px;
            padding: 20px;
        }
        #main-display { font-size: 55px; font-weight: bold; margin: 0; color: #2d3436; }
        #answer-display { font-size: 26px; color: var(--secondary); font-weight: 500; margin-top: 15px; }
        
        .back-btn { background: #b2bec3; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        .next-btn { background: var(--secondary); color: white; border: none; padding: 12px 30px; border-radius: 10px; font-size: 16px; cursor: pointer; width: 100%; }
        
        /* Watermark Style */
        .watermark {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #95a5a6;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="menu-page">
        <h2 style="margin-top:0">Korean Master</h2>
        <button class="menu-btn" onclick="startApp('time')">වෙලාව කියවීම</button>
        <button class="menu-btn" onclick="startApp('native')">Native Korean</button>
        <button class="menu-btn" onclick="startApp('sino')">Sino Korean</button>
    </div>

    <div id="study-page" class="card">
        <h3 id="mode-title" style="color:var(--primary)">Mode</h3>
        <div class="display-box" onclick="showAnswer()">
            <div id="main-display">?</div>
            <div id="answer-display">ටච් කරන්න</div>
        </div>
        <button class="next-btn" onclick="generateQuestion()">ඊළඟ එක</button>
        <button class="back-btn" onclick="showMenu()">ප්‍රධාන මෙනුවට</button>
    </div>
</div>

<div class="watermark">Korean with leen thilina</div>

<script>
    let currentMode = '';
    let currentAnswer = '';

    const data = {
        native: [
            {n: "1", k: "하나 (Hana)"}, {n: "2", k: "둘 (Dul)"}, {n: "3", k: "셋 (Set)"},
            {n: "4", k: "넷 (Net)"}, {n: "5", k: "다섯 (Daseot)"}, {n: "6", k: "여섯 (Yeoseot)"},
            {n: "7", k: "일곱 (Ilgop)"}, {n: "8", k: "여덟 (Yeodeol)"}, {n: "9", k: "아홉 (Ahop)"}, {n: "10", k: "열 (Yeol)"}
        ],
        sino: [
            {n: "1", k: "일 (Il)"}, {n: "2", k: "이 (I)"}, {n: "3", k: "삼 (Sam)"},
            {n: "4", k: "사 (Sa)"}, {n: "5", k: "오 (O)"}, {n: "6", k: "육 (Yuk)"},
            {n: "7", k: "칠 (Chil)"}, {n: "8", k: "팔 (Pal)"}, {n: "9", k: "구 (Gu)"}, {n: "10", k: "십 (Sip)"}
        ],
        nativeHours: ["", "한 (Han)", "두 (Du)", "세 (Se)", "네 (Ne)", "다섯 (Daseot)", "여섯 (Yeoseot)", "일곱 (Ilgop)", "여덟 (Yeodeol)", "아홉 (Ahop)", "열 (Yeol)", "열한 (Yeol-han)", "열두 (Yeol-du)"],
        sinoMinutes: ["영", "일", "이", "삼", "사", "오", "육", "칠", "팔", "구", "십"]
    };

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('study-page').style.display = 'block';
        let titles = { 'time': 'වෙලාව කියවීම', 'native': 'Native Korean', 'sino': 'Sino Korean' };
        document.getElementById('mode-title').innerText = titles[mode];
        generateQuestion();
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('study-page').style.display = 'none';
    }

    function generateQuestion() {
        let display = document.getElementById('main-display');
        document.getElementById('answer-display').innerText = "ටච් කරන්න";
        document.getElementById('answer-display').style.color = "#b2bec3";

        if (currentMode === 'native' || currentMode === 'sino') {
            let list = data[currentMode];
            let item = list[Math.floor(Math.random() * list.length)];
            display.innerText = item.n;
            currentAnswer = item.k;
        } 
        else if (currentMode === 'time') {
            let hour = Math.floor(Math.random() * 12) + 1;
            let minute = Math.floor(Math.random() * 6) * 10;
            display.innerText = `${hour}:${minute === 0 ? '00' : minute}`;
            
            let hKor = data.nativeHours[hour] + " 시 (si)";
            let mKor = "";
            if (minute === 0) mKor = "";
            else if (minute === 30) mKor = " 반 (ban)";
            else {
                let mTens = minute / 10;
                mKor = " " + (mTens === 1 ? "" : data.sino[mTens-1].k.split(' ')[0]) + "십 분 (sip-bun)";
            }
            currentAnswer = hKor + mKor;
        }
    }

    function showAnswer() {
        document.getElementById('answer-display').innerText = currentAnswer;
        document.getElementById('answer-display').style.color = "var(--secondary)";
    }
</script>
</body>
</html>
