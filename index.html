<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Study Master</title>
    <style>
        /* මූලික පාටවල් (Light Mode) */
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f2f5;
            --text-main: #2d3436;
            --text-secondary: #00b894;
            --card-bg: white;
            --dashed-border: #ddd;
            --toggle-active: #fff;
            --toggle-bg: #ccc;
        }

        /* ඩාර්ක් මෝඩ් සඳහා පාටවල් (Dark Mode) */
        [data-theme="dark"] {
            --primary: #a29bfe;
            --bg: #1a1a2e;
            --text-main: #f0f2f5;
            --text-secondary: #55efc4;
            --card-bg: #16213e;
            --dashed-border: #444;
            --toggle-active: #1a1a2e;
            --toggle-bg: #34495e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        #app-container {
            width: 85%;
            max-width: 380px;
            background-color: var(--card-bg);
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }
        
        /* Menu Buttons */
        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            background: var(--primary);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
        }
        .menu-btn:hover { opacity: 0.9; }
        .menu-btn:active { transform: scale(0.97); }
        
        .card { display: none; }
        
        /* Display Box Styling */
        .display-box {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px dashed var(--dashed-border);
            border-radius: 20px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.02);
            transition: 0.3s ease;
        }
        
        #main-display { font-size: 60px; font-weight: bold; color: var(--text-main); transition: 0.3s; }
        #answer-display { 
            font-size: 24px; color: var(--text-secondary); font-weight: 600; 
            margin-top: 15px; line-height: 1.4; transition: 0.3s;
        }
        
        .next-btn { 
            background: var(--secondary); color: white; border: none; 
            padding: 16px; border-radius: 12px; font-size: 17px; 
            font-weight: bold; cursor: pointer; width: 100%; 
        }
        .back-btn { 
            background: transparent; color: var(--text-main); border: none; 
            padding: 10px; cursor: pointer; margin-top: 15px; 
            text-decoration: underline; font-size: 14px; opacity: 0.7;
        }

        /* Watermark Styles */
        .watermark {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: var(--text-main);
            opacity: 0.4;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }

        /* Toggle Switch Styles */
        .theme-toggle {
            position: absolute;
            top: -60px;
            right: 0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--toggle-bg);
            transition: .4s;
            border-radius: 34px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: var(--toggle-active);
            transition: .4s;
            border-radius: 50%;
            z-index: 2;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); }

        .icon { font-size: 14px; }
    </style>
</head>
<body>

<div id="app-container">
    <div class="theme-toggle">
        <label class="switch">
            <input type="checkbox" id="theme-checkbox">
            <span class="slider">
                <span class="icon">☀️</span>
                <span class="icon">🌙</span>
            </span>
        </label>
    </div>

    <div id="menu-page">
        <button class="menu-btn" onclick="startApp('time')">වෙලාව කියවමු (Time)</button>
        <button class="menu-btn" onclick="startApp('native')">ගණන් කරමු (Native Korean)</button>
        <button class="menu-btn" onclick="startApp('sino')">අංක සහ ඉලක්කම් (Sino Korean)</button>
    </div>

    <div id="study-page" class="card">
        <h3 id="mode-title" style="color:var(--primary); margin: 0 0 20px 0;">Mode</h3>
        <div class="display-box" onclick="showAnswer()">
            <div id="main-display">?</div>
            <div id="answer-display">ටච් කරන්න</div>
        </div>
        <button class="next-btn" onclick="generateQuestion()">ඊළඟ එක</button>
        <button class="back-btn" onclick="showMenu()">ප්‍රධාන මෙනුවට</button>
    </div>
</div>

<div class="watermark">Korean with leen thilina</div>

<script>
    let currentMode = '';
    let currentAnswer = '';

    const data = {
        native: [
            {n: "1", k: "하나 (Hana)"}, {n: "2", k: "둘 (Dul)"}, {n: "3", k: "셋 (Set)"},
            {n: "4", k: "넷 (Net)"}, {n: "5", k: "다섯 (Daseot)"}, {n: "6", k: "여섯 (Yeoseot)"},
            {n: "7", k: "일곱 (Ilgop)"}, {n: "8", k: "여덟 (Yeodeol)"}, {n: "9", k: "아홉 (Ahop)"}, {n: "10", k: "열 (Yeol)"}
        ],
        sino: [
            {n: "1", k: "일 (Il)"}, {n: "2", k: "이 (I)"}, {n: "3", k: "삼 (Sam)"},
            {n: "4", k: "사 (Sa)"}, {n: "5", k: "오 (O)"}, {n: "6", k: "육 (Yuk)"},
            {n: "7", k: "칠 (Chil)"}, {n: "8", k: "팔 (Pal)"}, {n: "9", k: "구 (Gu)"}, {n: "10", k: "십 (Sip)"}
        ],
        hNative: ["", "한", "두", "세", "네", "다섯", "여섯", "일곱", "여덟", "아홉", "열", "열හන්", "열두"],
        hEng: ["", "Han", "Du", "Se", "Ne", "Daseot", "Yeoseot", "Ilgop", "Yeodeol", "Ahop", "Yeol", "Yeol-han", "Yeol-du"],
        mSino: {
            10: {k: "십", e: "sip"}, 20: {k: "이십", e: "i-sip"}, 30: {k: "삼십", e: "sam-sip"},
            40: {k: "사십", e: "sa-sip"}, 50: {k: "오십", e: "o-sip"}
        }
    };

    // Dark/Light Mode Logic
    const themeCheckbox = document.getElementById('theme-checkbox');
    themeCheckbox.addEventListener('change', () => {
        if(themeCheckbox.checked) {
            document.body.setAttribute('data-theme', 'dark');
        } else {
            document.body.removeAttribute('data-theme');
        }
    });

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('study-page').style.display = 'block';
        let titles = { 'time': 'වෙලාව කියවමු', 'native': 'Native Korean', 'sino': 'Sino Korean' };
        document.getElementById('mode-title').innerText = titles[mode];
        generateQuestion();
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('study-page').style.display = 'none';
    }

    function generateQuestion() {
        let display = document.getElementById('main-display');
        document.getElementById('answer-display').innerText = "ටච් කරන්න";
        document.getElementById('answer-display').style.opacity = "0.5";

        if (currentMode === 'native' || currentMode === 'sino') {
            let list = data[currentMode];
            let item = list[Math.floor(Math.random() * list.length)];
            display.innerText = item.n;
            currentAnswer = item.k;
        } 
        else if (currentMode === 'time') {
            let hour = Math.floor(Math.random() * 12) + 1;
            let minute = Math.floor(Math.random() * 6) * 10;
            display.innerText = `${hour}:${minute === 0 ? '00' : minute}`;
            
            let korPart = data.hNative[hour] + " 시";
            let engPart = data.hEng[hour] + " si";

            if (minute === 30) {
                korPart += " 반";
                engPart += " ban";
            } else if (minute !== 0) {
                korPart += " " + data.mSino[minute].k + " 분";
                engPart += " " + data.mSino[minute].e + " bun";
            }
            currentAnswer = korPart + "<br>(" + engPart + ")";
        }
    }

    function showAnswer() {
        document.getElementById('answer-display').innerHTML = currentAnswer;
        document.getElementById('answer-display').style.opacity = "1";
    }
</script>
</body>
</html>
