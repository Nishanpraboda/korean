<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Study Master</title>
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f2f5;
            --text-main: #2d3436; --card-bg: white; --dashed-border: #ddd;
            --toggle-bg: #ccc; --toggle-active: #fff;
            --color-time: #6c5ce7; --color-pure: #0984e3;
            --color-sino: #e84393; --color-days: #e67e22; 
            --color-math: #27ae60; --color-colors: #2980b9; 
            --color-safety: #e74c3c; /* අලුත් සෙක්ෂන් එකට පාට */
        }

        [data-theme="dark"] {
            --bg: #1a1a2e; --text-main: #f0f2f5; --card-bg: #16213e;
            --dashed-border: #444; --toggle-bg: #34495e; --toggle-active: #1a1a2e;
        }

        body {
            font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg);
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            overflow: hidden; transition: 0.5s;
        }

        #app-container {
            width: 90%; max-width: 400px; background-color: var(--card-bg);
            padding: 30px 20px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            text-align: center; position: relative; max-height: 90vh; overflow-y: auto;
        }

        /* Scrollbar හංගන්න */
        #app-container::-webkit-scrollbar { display: none; }
        
        .menu-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0; border: none;
            border-radius: 15px; color: white; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .menu-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }
        
        #btn-time { background: var(--color-time); }
        #btn-pure { background: var(--color-pure); }
        #btn-sino { background: var(--color-sino); }
        #btn-days { background: var(--color-days); }
        #btn-math { background: var(--color-math); }
        #btn-colors { background: var(--color-colors); }
        #btn-safety { background: var(--color-safety); } /* අලුත් බොත්තම */

        .card { display: none; position: relative; }

        .info-icon {
            position: absolute; top: -5px; right: 0;
            width: 25px; height: 25px; border: 2px solid var(--text-main); color: var(--text-main);
            border-radius: 50%; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 14px; opacity: 0.6;
        }
        
        .display-box {
            min-height: 250px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            border: 2px dashed var(--dashed-border); border-radius: 20px;
            margin-bottom: 20px; padding: 20px; line-height: 1.4;
        }

        #main-display { font-size: 40px; font-weight: bold; color: var(--text-main); margin-bottom: 10px; transition: 0.3s; }
        #secondary-display { font-size: 24px; color: var(--primary); font-weight: bold; min-height: 30px; opacity: 0; transition: 0.3s; margin-bottom: 15px; }
        #answer-display { font-size: 22px; color: var(--secondary); font-weight: 600; margin-top: 5px; transition: 0.3s; }
        
        .next-btn { background: var(--secondary); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; }
        .back-btn { background: transparent; color: var(--text-main); border: none; padding: 10px; cursor: pointer; margin-top: 10px; text-decoration: underline; font-size: 14px; opacity: 0.7; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); color: var(--text-main); padding: 25px; border-radius: 20px; width: 80%; max-width: 320px; text-align: left; }
        .close-modal { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; margin-top: 15px; cursor: pointer; }

        .switch { position: absolute; top: 15px; right: 15px; display: inline-block; width: 55px; height: 30px; z-index: 100; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--toggle-bg); transition: .4s; border-radius: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: var(--toggle-active); transition: .4s; border-radius: 50%; z-index: 2; }
        input:checked + .slider { background-color: var(--primary); }
        
        .watermark { position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 11px; color: var(--text-main); opacity: 0.4; letter-spacing: 2px; z-index: -1; }
    </style>
</head>
<body>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <h4 id="modalTitle" style="margin-top:0;">Info</h4>
        <p id="modalDesc"></p>
        <ul id="modalList" style="padding-left:20px;"></ul>
        <button class="close-modal" onclick="closeInfo()">වැහුණා (Close)</button>
    </div>
</div>

<label class="switch">
    <input type="checkbox" id="theme-checkbox">
    <span class="slider"><span style="font-size:12px">☀️</span><span style="font-size:12px">🌙</span></span>
</label>

<div id="app-container">
    <div id="menu-page">
        <h2 style="color: var(--primary); margin-bottom: 20px; font-size: 22px;">Korean Master</h2>
        <button class="menu-btn" id="btn-safety" onclick="startApp('safety')">⚠️ ආරක්ෂක ප්‍රශ්න 112</button>
        <button class="menu-btn" id="btn-time" onclick="startApp('time')">වෙලාව (Time)</button>
        <button class="menu-btn" id="btn-pure" onclick="startApp('pure')">PURE KOREAN අංක</button>
        <button class="menu-btn" id="btn-sino" onclick="startApp('sino')">SINO KOREAN අංක</button>
        <button class="menu-btn" id="btn-days" onclick="startApp('days')">සතියේ දවස් (Days)</button>
        <button class="menu-btn" id="btn-math" onclick="startApp('math')">සරල ගණිතය (Math)</button>
        <button class="menu-btn" id="btn-colors" onclick="startApp('colors')">වර්ණ (Colors)</button>
    </div>

    <div id="study-page" class="card">
        <div class="info-icon" onclick="openInfo()">i</div>
        <h3 id="mode-title" style="margin: 0 0 15px 0;">Mode</h3>
        <div class="display-box" id="card-box" onclick="handleBoxClick()">
            <div id="main-display">?</div>
            <div id="secondary-display"></div>
            <div id="answer-display">ටච් කරන්න</div>
        </div>
        <button class="next-btn" onclick="generateQuestion()">ඊළඟ එක</button>
        <button class="back-btn" onclick="showMenu()">ප්‍රධාන මෙනුවට</button>
    </div>
</div>

<div class="watermark">KOREAN WITH LEEN THILINA</div>

<script>
    let currentMode = '';
    let currentAnswer = '';
    let currentSecondary = '';
    let clickStep = 0;

    const infoData = {
        safety: { title: "ආරක්ෂක ප්‍රශ්න (Safety Q&A)", desc: "කර්මාන්තශාලා ආරක්ෂාව පිළිබඳ EPS-TOPIK ප්‍රශ්න 112.", uses: ["1st Tap: සිංහල තේරුම (ප්‍රශ්නය)", "2nd Tap: කොරියානු පිළිතුර සහ සිංහල තේරුම"] },
        pure: { title: "Pure Korean", desc: "ගණන් කිරීමට සහ වයස පැවසීමට භාවිතා කරයි.", uses: ["Age", "Animals/People", "Hours", "Objects"] },
        sino: { title: "Sino Korean", desc: "දුරකථන අංක, මුදල් සහ දිනයන් සඳහා භාවිතා වේ.", uses: ["Phone Numbers", "Money", "Dates/Minutes", "Floors"] },
        time: { title: "Time", desc: "පැය සඳහා Pure ද, විනාඩි සඳහා Sino ද යොදා ගනී.", uses: ["පැය -> Pure", "විනාඩි -> Sino"] },
        days: { title: "Days", desc: "සතියේ දවස් 'Yoil' වලින් අවසන් වේ.", uses: ["Monday - Sunday"] },
        math: { title: "Math (Sino)", desc: "ගණිතයේදී Sino Korean භාවිතා වේ.", uses: ["+ (Deohagi)", "- (Ppaegi)"] },
        colors: { title: "Colors (색깔)", desc: "වර්ණ හැඳින්වීමේදී නාම පද (Noun) ලෙස හෝ නාම විශේෂණ (Adjective) ලෙස භාවිතා කළ හැක.", uses: ["පොදු වර්ණ 10ක්", "Noun + 색 (Saek)"] }
    };

    const sinoMap = { 0:"공", 1:"일", 2:"이", 3:"삼", 4:"사", 5:"오", 6:"육", 7:"칠", 8:"팔", 9:"구", 10:"십" };

    function getSino(num) {
        if (num <= 10) return sinoMap[num];
        if (num < 100) {
            let tens = Math.floor(num / 10);
            let ones = num % 10;
            let res = (tens === 1 ? "" : sinoMap[tens]) + "십";
            if (ones !== 0) res += sinoMap[ones];
            return res;
        }
        return num;
    }

    const data = {
        pure: [ {n: "1", k: "하나 (Hana)"}, {n: "2", k: "둘 (Dul)"}, {n: "3", k: "셋 (Set)"}, {n: "4", k: "넷 (Net)"}, {n: "5", k: "다섯 (Daseot)"}, {n: "6", k: "여섯 (Yeoseot)"}, {n: "7", k: "일곱 (Ilgop)"}, {n: "8", k: "여덟 (Yeodeol)"}, {n: "9", k: "아홉 (Ahop)"}, {n: "10", k: "열 (Yeol)"} ],
        sino: [ {n: "1", k: "일 (Il)"}, {n: "2", k: "이 (I)"}, {n: "3", k: "삼 (Sam)"}, {n: "4", k: "사 (Sa)"}, {n: "5", k: "오 (O)"}, {n: "6", k: "육 (Yuk)"}, {n: "7", k: "칠 (Chil)"}, {n: "8", k: "팔 (Pal)"}, {n: "9", k: "구 (Gu)"}, {n: "10", k: "십 (Sip)"} ],
        days: [ {n: "ඉරිදා", k: "일요일 (Iryoil)"}, {n: "සඳුදා", k: "월요일 (Woryoil)"}, {n: "අඟහරුවාදා", k: "화요일 (Hwayoil)"}, {n: "බදාදා", k: "수요일 (Suyoil)"}, {n: "බ්‍රහස්පතින්දා", k: "목요일 (Mogyoil)"}, {n: "සිකුරාදා", k: "금요일 (Geumyoil)"}, {n: "සෙනසුරාදා", k: "토요일 (Toyoil)"} ],
        colors: [
            {n: "රතු", k: "빨간색 (Ppalgan-saek)"}, {n: "නිල්", k: "파란색 (Paran-saek)"}, {n: "කහ", k: "노란색 (Noran-saek)"}, {n: "කොළ", k: "초록색 (Chorok-saek)"},
            {n: "සුදු", k: "하얀색 (Hayan-saek)"}, {n: "කළු", k: "검정색 (Geomjeong-saek)"}, {n: "තැඹිලි", k: "주황색 (Juhwang-saek)"}, {n: "දම්", k: "보라색 (Bora-saek)"},
            {n: "රෝස", k: "분홍색 (Bunhong-saek)"}, {n: "දුඹුරු", k: "갈색 (Gal-saek)"}
        ],
        hNative: ["", "한", "두", "세", "네", "다섯", "여섯", "일곱", "여덟", "아홉", "열", "열한", "열두"],
        safety: [
            {qk:"보호구가 무엇인가요?", qs:"ආරක්ෂිත උපකරණ (PPE) යනු මොනවාද?", ak:"사고를 예방하고 몸을 보호하는 장비입니다.", as:"අනතුරු වළක්වා ගැනීමට සහ ශරීරය ආරක්ෂා කර ගැනීමට භාවිතා කරන උපකරණ වේ."},
            {qk:"보호구에는 어떤 종류가 있나요?", qs:"ආරක්ෂිත උපකරණ වර්ග මොනවාද?", ak:"안전모, 안전화, 보안경, 안전장갑, 귀마개 등이 있습니다.", as:"ආරක්ෂිත හිස්වැසුම් (Helmet), ආරක්ෂිත සපත්තු, ආරක්ෂිත ඇස් කණ්ණාඩි, ආරක්ෂිත අත්කම් සහ කන් වැසුම් ආදිය පවතී."},
            {qk:"보호구를 왜 착용해야 할까요?", qs:"ආරක්ෂිත උපකරණ පැළඳිය යුත්තේ ඇයි?", ak:"부상을 방지하고 생명을 보호하기 위해서입니다.", as:"තුවාල සිදුවීම වැළැක්වීමට සහ ජීවිතය ආරක්ෂා කර ගැනීමටයි."},
            {qk:"머리를 보호하기 위해 착용하는 보호구는 무엇인가요?", qs:"හිස ආරක්ෂා කර ගැනීම සඳහා පළඳින ආරක්ෂිත උපකරණය කුමක්ද?", ak:"안전모입니다.", as:"ආරක්ෂිත හිස්වැසුමයි."},
            {qk:"높은 장소에서 작업할 때, 안전모 외에 착용해야 하는 보호구는 무엇인가요?", qs:"උස් ස්ථානයක වැඩ කරන විට, ආරක්ෂිත හිස්වැසුමට අමතරව පැළඳිය යුතු ආරක්ෂිත උපකරණය කුමක්ද?", ak:"안전대(안전벨트)를 추가로 착용해야 합니다.", as:"ආරක්ෂිත පටිය (Safety Belt) අතිරේකව පැළඳිය යුතුය."},
            {qk:"비상구가 무엇인가요?", qs:"හදිසි පිටවීම් දොරටුව (Emergency Exit) යනු කුමක්ද?", ak:"화재 등 비상시에 탈출하는 문입니다.", as:"ගින්නක් වැනි හදිසි අවස්ථාවකදී පිටවීම සඳහා ඇති දොරයි."},
            {qk:"대피로가 무엇인가요?", qs:"මාරුවීමේ මාර්ගය (Evacuation Route) යනු කුමක්ද?", ak:"안전한 곳으로 피하는 길입니다.", as:"ආරක්ෂිත ස්ථානයකට ලඟාවීම සඳහා ඇති මාර්ගයයි."},
            {qk:"비상구 등 대피로는 왜 확인해야 할까요?", qs:"හදිසි පිටවීම් සහ මාරුවීමේ මාර්ග කලින් හඳුනාගත යුත්තේ ඇයි?", ak:"위급 상황 시 신속하게 대피하기 위해서입니다.", as:"හදිසි අවස්ථාවකදී ඉක්මනින් ඉවත් වීම සඳහායි."},
            {qk:"소화기란 무엇이며 소화기의 색상은 어떻게 되나요?", qs:"ගිනි නිවන උපකරණය යනු කුමක්ද සහ එහි වර්ණය කුමක්ද?", ak:"불을 끄는 기구이며, 보통 빨간색입니다.", as:"එය ගිනි නිවීම සඳහා භාවිතා කරන උපකරණයක් වන අතර සාමාන්‍යයෙන් රතු පැහැති වේ."},
            {qk:"안전보건표지가 무엇인가요?", qs:"ආරක්ෂක සහ සෞඛ්‍ය සංඥා පුවරු යනු මොනවාද?", ak:"위험을 경고하고 안전 수칙을 알리는 표지판입니다.", as:"අනතුරු ගැන අනතුරු ඇඟවීමට සහ ආරක්ෂක නීති දැනුම් දීමට ඇති පුවරු වේ."},
            {qk:"안전보건표지에는 어떤 종류가 있나요?", qs:"ආරක්ෂක සහ සෞඛ්‍ය සංඥා වර්ග මොනවාද?", ak:"금지, 경고, 지시, 안내 표지가 있습니다.", as:"තහනම්, අනතුරු ඇඟවීමේ, නියෝග සහ මඟපෙන්වීමේ සංඥා පවතී."},
            {qk:"안전보건표지를 왜 확인해야 할까요?", qs:"ආරක්ෂක සංඥා පුවරු පරීක්ෂා කළ යුත්තේ ඇයි?", ak:"위험 요소를 미리 알고 사고를 방지하기 위해서입니다.", as:"අනතුරුදායක සාධක කලින් හඳුනාගෙන අනතුරු වළක්වා ගැනීමටයි."},
            {qk:"위험장소 출입금지 등 금지표지는 무슨 색인가요?", qs:"අනතුරුදායක ස්ථානවලට ඇතුළුවීම තහනම් කිරීමේ සංඥා පුවරු කුමන වර්ණයක්ද?", ak:"빨간색입니다.", as:"රතු පැහැයයි."},
            {qk:"방호장치가 무엇인가요?", qs:"ආරක්ෂිත ආවරණ/උපකරණ (Safety Guard) යනු කුමක්ද?", ak:"기계의 위험한 부분에 설치한 안전장치입니다.", as:"යන්ත්‍ර සූත්‍රවල අනතුරුදායක කොටස්වල සවි කර ඇති ආරක්ෂක උපාංග වේ."},
            {qk:"정상 작동이 무슨 뜻인가요?", qs:"සාමාන්‍ය ක්‍රියාකාරිත්වය යනු කුමක්ද?", ak:"기계나 장치가 고장 없이 잘 돌아가는 상태입니다.", as:"යන්ත්‍රයක් හෝ උපාංගයක් කිසිදු දෝෂයකින් තොරව හොඳින් ක්‍රියාත්මක වන තත්ත්වයයි."},
            {qk:"방호장치의 정상 작동 여부를 왜 확인해야 하나요?", qs:"ආරක්ෂිත උපාංග නිසි පරිදි ක්‍රියා කරන්නේදැයි පරීක්ෂා කළ යුත්තේ ඇයි?", ak:"사고를 예방하고 안전하게 작업하기 위해서입니다.", as:"අනතුරු වළක්වා ගැනීමට සහ ආරක්ෂිතව වැඩ කිරීමටයි."},
            {qk:"작업 전 안전점검이 무엇인가요?", qs:"වැඩ ආරම්භ කිරීමට පෙර ආරක්ෂක පරීක්ෂාව යනු කුමක්ද?", ak:"작업을 시작하기 전에 기계와 장비를 미리 확인하는 것입니다.", as:"වැඩ ආරම්භ කිරීමට පෙර යන්ත්‍ර සූත්‍ර සහ උපකරණ කලින් පරීක්ෂා කිරීමයි."},
            {qk:"화학물질이 무엇인가요?", qs:"රසායනික ද්‍රව්‍ය යනු මොනවාද?", ak:"산업용 원료나 재료로 사용하는 화학적 성분의 물질입니다.", as:"කර්මාන්තශාලාවල අමුද්‍රව්‍ය ලෙස භාවිතා කරන රසායනික සංයුතියකින් යුත් ද්‍රව්‍ය වේ."},
            {qk:"MSDS(물질안전보건자료)가 무엇인가요?", qs:"MSDS (ද්‍රව්‍ය ආරක්ෂණ දත්ත පත්‍රිකාව) යනු කුමක්ද?", ak:"화학물질의 위험성과 취급 주의사항이 적힌 설명서입니다.", as:"රසායනික ද්‍රව්‍යවල ඇති අනතුරුදායක බව සහ ඒවා පරිහරණය කිරීමේදී සැලකිලිමත් විය යුතු කරුණු ඇතුළත් උපදෙස් පත්‍රිකාවයි."},
            {qk:"화학물질 MSDS(물질안전보건자료)를 왜 확인해야 할까요?", qs:"රසායනික ද්‍රව්‍යවල MSDS පරීක්ෂා කළ යුත්තේ ඇයි?", ak:"유해성을 알고 안전하게 다루기 위해서입니다.", as:"එහි ඇති හානිකර බව වටහාගෙන එය ආරක්ෂිතව හැසිරවීම සඳහායි."},
            {qk:"화학물질을 사용하는 작업 전에는 어떤 보호구를 준비해야 하나요?", qs:"රසායනික ද්‍රව්‍ය භාවිතා කරන වැඩකට පෙර සූදානම් කරගත යුතු ආරක්ෂිත උපකරණ මොනවාද?", ak:"화학물질용 장갑, 마스크, 보안경 등입니다.", as:"රසායනික ද්‍රව්‍ය සඳහා වන අත්කම්, මුහුණු ආවරණ (Mask) සහ ආරක්ෂිත ඇස් කණ්ණාඩි ආදියයි."},
            {qk:"밀폐공간이 무엇인가요?", qs:"සිරවූ/සීමිත අවකාශයක් (Confined Space) යනු කුමක්ද?", ak:"환기가 안 되어 산소가 부족하거나 유독가스가 찬 장소입니다.", as:"වාතාශ්‍රය නොලැබීම නිසා ඔක්සිජන් හිඟ වූ හෝ විෂ වායු පිරී ඇති ස්ථාන වේ."},
            {qk:"환기가 무슨 뜻인가요?", qs:"වාතාශ්‍රය (Ventilation) යනු කුමක්ද?", ak:"공기를 교체하여 깨끗한 상태로 만드는 것입니다.", as:"වාතය මාරු කර පිරිසිදු තත්ත්වයට පත් කිරීමයි."},
            {qk:"밀폐공간에서 작업하기 전에 왜 환기를 해야 할까요?", qs:"සීමිත අවකාශයක වැඩ කිරීමට පෙර වාතාශ්‍රය ලබා දිය යුත්තේ ඇයි?", ak:"질식 사고를 예방하기 위해서입니다.", as:"හුස්ම හිරවීමෙන් සිදුවන අනතුරු වළක්වා ගැනීමටයි."},
            {qk:"가동이 무슨 뜻인가요?", qs:"ක්‍රියාත්මක වීම (Operation) යනු කුමක්ද?", ak:"기계가 움직이고 있는 상태입니다.", as:"යන්ත්‍රය වැඩ කරමින් පවතින තත්ත්වයයි."},
            {qk:"정비가 무슨 뜻인가요?", qs:"නඩත්තු කිරීම (Maintenance) යනු කුමක්ද?", ak:"기계를 고치거나 점검하며 관리하는 것입니다.", as:"යන්ත්‍ර අලුත්වැඩියා කිරීම, පරීක්ෂා කිරීම සහ නඩත්තු කිරීමයි."},
            {qk:"가동 중인 기계를 왜 정비하면 안 될까요?", qs:"ක්‍රියාත්මක වන යන්ත්‍රයක් නඩත්තු නොකළ යුත්තේ ඇයි?", ak:"기계에 끼이거나 큰 부상을 당할 수 있기 때문입니다.", as:"යන්ත්‍රයට හිරවීමෙන් බරපතල තුවාල සිදුවිය හැකි බැවිනි."},
            {qk:"기계가 알 수 없는 이유로 멈추면 어떻게 해야 하나요?", qs:"යන්ත්‍රය නොදන්නා හේතුවක් නිසා නතර වුවහොත් කුමක් කළ යුතුද?", ak:"전원을 끄고 관리자에게 즉시 보고합니다.", as:"විදුලි බලය විසන්ධි කර වහාම කළමනාකරුට/සුපරීක්ෂකට දැනුම් දිය යුතුය."},
            {qk:"모르는 기계가 무슨 뜻인가요?", qs:"නොදන්නා යන්ත්‍රයක් යනු කුමක්ද?", ak:"사용법을 배우지 않았거나 익숙하지 않은 기계입니다.", as:"භාවිතා කරන ආකාරය ඉගෙන නොගත් හෝ හුරුපුරුදු නැති යන්ත්‍රයකි."},
            {qk:"임의 조작이 무슨 뜻인가요?", qs:"අත්තනෝමතික ලෙස ක්‍රියා කරවීම යනු කුමක්ද?", ak:"허락 없이 마음대로 만지는 것입니다.", as:"අවසරයකින් තොරව තමන්ට අවශ්‍ය පරිදි යන්ත්‍ර ක්‍රියා කරවීම හෝ ඇල්ලීමයි."},
            {qk:"모르는 기계를 왜 임의로 조작하면 안 될까요?", qs:"නොදන්නා යන්ත්‍රයක් තමන්ට අවශ්‍ය පරිදි ක්‍රියා නොකළ යුත්තේ ඇයි?", ak:"오작동으로 인한 사고 위험이 크기 때문입니다.", as:"වැරදි ක්‍රියාකාරිත්වය නිසා අනතුරු සිදුවීමේ අවදානම වැඩි බැවිනි."},
            {qk:"비상정지장치가 무엇인가요?", qs:"හදිසි නැවතුම් උපාංගය (Emergency Stop) යනු කුමක්ද?", ak:"위급할 때 기계를 즉시 멈추게 하는 버튼입니다.", as:"හදිසි අවස්ථාවකදී යන්ත්‍රය වහාම නතර කරන බොත්තමයි."},
            {qk:"안전장치 및 시설이 무엇인가요?", qs:"ආරක්ෂිත උපාංග සහ පහසුකම් යනු මොනවාද?", ak:"사고를 막기 위해 설치된 모든 장비와 구조물입니다.", as:"අනතුරු වැළැක්වීම සඳහා සවි කර ඇති සියලුම උපකරණ සහ ව්‍යුහයන් වේ."},
            {qk:"해체 및 해지가 무슨 뜻인가요?", qs:"ගැලවීම හෝ අක්‍රීය කිරීම යනු කුමක්ද?", ak:"설치된 장치를 떼어내거나 기능을 없애는 것입니다.", as:"සවි කර ඇති උපාංගයක් ඉවත් කිරීම හෝ එහි ක්‍රියාකාරිත්වය නැති කිරීමයි."},
            {qk:"안전장치 및 시설을 왜 해체하거나 해지하면 안 될까요?", qs:"ආරක්ෂිත උපාංග හෝ පහසුකම් නොගැලවිය යුත්තේ හෝ අක්‍රීය නොකළ යුත්තේ ඇයි?", ak:"안전장치가 없으면 사고 위험이 매우 높기 때문입니다.", as:"ආරක්ෂිත උපාංග නොමැති නම් අනතුරු වීමේ අවදානම ඉතා ඉහළ බැවිනි."},
            {qk:"기계의 안전장치를 해체하고 작업하면 어떤 위험이 있나요?", qs:"යන්ත්‍රයේ ආරක්ෂිත උපාංග ගලවා වැඩ කළහොත් ඇතිවන අනතුර කුමක්ද?", ak:"기계에 끼이거나 감전 등 큰 사고가 발생할 수 있습니다.", as:"යන්ත්‍රයට හිරවීම හෝ විදුලි සැර වැදීම වැනි බරපතල අනතුරු සිදුවිය හැක."},
            {qk:"지정이 무슨 뜻인가요?", qs:"නම් කිරීම/නියම කිරීම (Designation) යනු කුමක්ද?", ak:"미리 정해 놓은 것을 의미합니다.", as:"කලින් තීරණය කර වෙන් කර ඇති දෙයයි."},
            {qk:"보조 도구 및 공구가 무엇인가요?", qs:"සහායක මෙවලම් සහ උපකරණ යනු මොනවාද?", ak:"작업을 돕기 위해 사용하는 도구입니다.", as:"වැඩ කටයුතු පහසු කර ගැනීමට උදව් වන මෙවලම් වේ."},
            {qk:"작업할 때 왜 지정된 보조 도구 및 공구를 사용해야 할까요?", qs:"වැඩ කිරීමේදී නියමිත සහායක මෙවලම් භාවිතා කළ යුත්තේ ඇයි?", ak:"작업 효율을 높이고 손 부상을 방지하기 위해서입니다.", as:"කාර්යක්ෂමතාව වැඩි කිරීමට සහ අත්වලට තුවාල වීම වැළැක්වීමටයි."},
            {qk:"기계 작업 시 보조 도구를 사용하는 이유가 무엇인가요?", qs:"යන්ත්‍ර සූත්‍ර සමඟ වැඩ කිරීමේදී සහායක මෙවලම් භාවිතා කරන්නේ ඇයි?", ak:"손이 기계에 직접 닿지 않게 하여 안전을 지키기 위해서입니다.", as:"දෑත් කෙලින්ම යන්ත්‍රයේ වැදීම වැළැක්වීමෙන් ආරක්ෂාව සැලසීම සඳහායි."},
            {qk:"지게차가 무엇인가요?", qs:"ෆෝක්ලිෆ්ට් (Forklift) යනු කුමක්ද?", ak:"무거운 짐을 실어 나르는 차입니다.", as:"බර පටවා ප්‍රවාහනය කරන වාහනයකි."},
            {qk:"안전벨트가 무엇인가요?", qs:"ආරක්ෂිත පටිය (Seatbelt) යනු කුමක්ද?", ak:"몸을 좌석에 고정해 주는 띠입니다.", as:"සිරුර අසුනට තබා සවි කරන පටියයි."},
            {qk:"시야 확보는 무슨 뜻일까요?", qs:"පැහැදිලි පෙනුමක් ලබා ගැනීම (Clear Visibility) යනු කුමක්ද?", ak:"앞뒤를 잘 볼 수 있는 상태를 만드는 것입니다.", as:"ඉදිරිපස සහ පසුපස පැහැදිලිව දැකගත හැකි තත්ත්වයක් සකස් කිරීමයි."},
            {qk:"지게차 운전 시 왜 안전벨트를 착용하고 시야를 확보해야 할까요?", qs:"ෆෝක්ලිෆ්ට් පදවන විට ආරක්ෂිත පටි පැළඳිය යුතු අතර පැහැදිලි පෙනුමක් ලබා ගත යුත්තේ ඇයි?", ak:"충돌이나 추락 사고를 예방하기 위해서입니다.", as:"හැපීම් හෝ පෙරළීම් අනතුරු වළක්වා ගැනීමටයි."},
            {qk:"지게차는 누가 운전할 수 있나요?", qs:"ෆෝක්ලිෆ්ට් පැදවිය හැක්කේ කාටද?", ak:"자격증이나 면허가 있는 사람만 운전할 수 있습니다.", as:"සහතික පත්‍රයක් හෝ රියදුරු බලපත්‍රයක් ඇති අයට පමණි."},
            {qk:"위험작업이 무엇인가요?", qs:"අනතුරුදායක වැඩ යනු කුමක්ද?", ak:"사고 발생 가능성이 높은 위험한 작업입니다.", as:"අනතුරු සිදුවීමේ හැකියාව වැඩි අවදානම් සහිත වැඩ වේ."},
            {qk:"2인 1조 작업이 무엇인가요?", qs:"දෙදෙනෙකු එකතු වී වැඩ කිරීම (2-Person Teamwork) යනු කුමක්ද?", ak:"두 명이 한 팀이 되어 함께 작업하는 것입니다.", as:"පුද්ගලයන් දෙදෙනෙකු එක කණ්ඩායමක් ලෙස එක්ව වැඩ කිරීමයි."},
            {qk:"위험작업은 왜 2인 1조로 해야 할까요?", qs:"අනතුරුදායක වැඩ දෙදෙනෙකු එකතු වී කළ යුත්තේ ඇයි?", ak:"작업과 감시를 동시에 하여 사고에 대비하기 위해서입니다.", as:"වැඩ කිරීම සහ අවට නිරීක්ෂණය කිරීම එකවර සිදු කර අනතුරුවලට මුහුණ දීම සඳහායි."},
            {qk:"사다리 위에서 혼자 작업할 수 있나요?", qs:"ඉණිමඟක් උඩ තනිවම වැඩ කළ හැකිද?", ak:"아니요, 반드시 아래에서 사다리를 잡아주는 사람이 있어야 합니다.", as:"නැත, අනිවාර්යයෙන්ම පහළින් ඉණිමඟ අල්ලා ගැනීමට තවත් අයෙකු සිටිය යුතුය."},
            {qk:"중장비가 무엇인가요?", qs:"බර යන්ත්‍ර සූත්‍ර (Heavy Equipment) යනු මොනවාද?", ak:"포크레인, 크레인 등 크고 힘센 장비입니다.", as:"එක්ස්කැවේටර්, ක්‍රේන් වැනි විශාල සහ බලවත් යන්ත්‍ර වේ."},
            {qk:"작업구역이 무엇인가요?", qs:"වැඩ කරන කලාපය (Work Zone) යනු කුමක්ද?", ak:"장비가 일하고 있는 정해진 범위입니다.", as:"යන්ත්‍ර සූත්‍ර ක්‍රියාත්මක වන පරිශ්‍රයයි."},
            {qk:"중장비 작업구역은 왜 접근을 금지하나요?", qs:"බර යන්ත්‍ර වැඩ කරන කලාපයට ඇතුළුවීම තහනම් කරන්නේ ඇයි?", ak:"장비와 부딪히는 큰 사고를 막기 위해서입니다.", as:"යන්ත්‍රයේ හැපීමෙන් සිදුවන බරපතල අනතුරු වැළැක්වීමටයි."},
            {qk:"근처에서 중장비가 작업을 하고 있으면 어떻게 해야 하나요?", qs:"අසල බර යන්ත්‍රයක් වැඩ කරමින් පවතී නම් කුමක් කළ යුතුද?", ak:"절대로 근처에 가지 말고 멀리 돌아갑니다.", as:"කිසිවිටකත් ඒ අසලට නොගොස් ඈතින් ගමන් කළ යුතුය."},
            {qk:"화재가 무엇인가요?", qs:"ගින්නක්/ගිනි ගැනීමක් (Fire) යනු කුමක්ද?", ak:"불이 나서 건물이나 물건이 타는 사고입니다.", as:"ගිනි ගැනීමක් නිසා ගොඩනැඟිලි හෝ බඩු බාහිරාදිය විනාශ වන අනතුරකි."},
            {qk:"화기가 무엇인지 알고 있나요?", qs:"ගිනි ප්‍රභවයන් (Ignition Source) යනු කුමක්ද?", ak:"불을 일으키는 도구라 라이터, 용접 불꽃 등을 말합니다.", as:"ගින්නක් ඇති කළ හැකි ලයිටර්, වෑල්ඩින් පුළිඟු වැනි උපකරණ හෝ ද්‍රව්‍ය වේ."},
            {qk:"화재 가능 물질 주변에서 왜 화기 사용을 금지하나요?", qs:"ගිනි ගත හැකි ද්‍රව්‍ය අසල ගිනි ප්‍රභවයන් තහනම් කරන්නේ ඇයි?", ak:"폭발이나 화재 사고를 막기 위해서입니다.", as:"පිපිරීම් හෝ ගිනි ගැනීම් අනතුරු වැළැක්වීම සඳහායි."},
            {qk:"불에 잘 타는 물건이 근처에 있으면 용접작업 전에 어떻게 해야 하나요?", qs:"පහසුවෙන් ගිනි ගන්නා බඩු අසල තිබේ නම් වෑල්ඩින් කිරීමට පෙර කුමක් කළ යුතුද?", ak:"주변의 물건을 모두 안전한 곳으로 치워야 합니다.", as:"අවට ඇති සියලුම දෑ ආරක්ෂිත ස්ථානයකට ඉවත් කළ යුතුය."},
            {qk:"불이 났을 때는 어떻게 해야 하나요?", qs:"ගින්නක් ඇති වූ විට කුමක් කළ යුතුද?", ak:"\"불이야\"라고 크게 외치고 대피한 후 119에 신고합니다.", as:"\"ගින්නක්\" කියා හයියෙන් කෑගසා ඉවත් වූ පසු 119 වෙත දැනුම් දිය යුතුය."},
            {qk:"화학물질이 무엇인가요?", qs:"රසායනික ද්‍රව්‍ය යනු මොනවාද?", ak:"유해 성분이 포함된 액체나 기체 등의 물질입니다.", as:"හානිකර සංරචක අඩංගු ද්‍රව හෝ වායුමය ද්‍රව්‍ය වේ."},
            {qk:"환기장치가 무엇인가요?", qs:"වාතාශ්‍රය පද්ධතිය (Exhaust System) යනු කුමක්ද?", ak:"오염된 공기를 밖으로 빼내는 장치입니다.", as:"අපිරිසිදු වාතය පිටතට ඇද දමන උපාංගයකි."},
            {qk:"화학물질 취급 시 왜 환기장치를 가동해야 할까요?", qs:"රසායනික ද්‍රව්‍ය පරිහරණයේදී වාතාශ්‍රය පද්ධතිය ක්‍රියාත්මක කළ යුත්තේ ඇයි?", ak:"유독가스 중독과 질식을 막기 위해서입니다.", as:"විෂ වායු ආශ්වාස වීම සහ හුස්ම හිරවීම වැළැක්වීමටයි."},
            {qk:"화학물질을 다룰 때는 어떻게 해야 하나요?", qs:"රසායනික ද්‍රව්‍ය හසුරුවන විට කුමක් කළ යුතුද?", ak:"알맞은 보호구를 착용하고 안전 수칙을 철저히 지킵니다.", as:"සුදුසු ආරක්ෂිත උපකරණ පැළඳ ආරක්ෂක නීති දැඩිව අනුගමනය කළ යුතුය."},
            {qk:"통제구역이 무엇인가요?", qs:"සීමිත/පාලිත ප්‍රදේශය (Restricted Area) යනු කුමක්ද?", ak:"허가된 사람만 들어갈 수 있는 장소입니다.", as:"අවසර ලත් පුද්ගලයන්ට පමණක් ඇතුළු විය හැකි ස්ථානයකි."},
            {qk:"허가가 무슨 뜻인가요?", qs:"අවසරය (Permission) යනු කුමක්ද?", ak:"관리자에게 승인을 받는 것입니다.", as:"කළමනාකරුගෙන් හෝ සුපරීක්ෂකගෙන් අනුමැතිය ලබා ගැනීමයි."},
            {qk:"통제구역은 왜 허가 없이 출입을 금지하나요?", qs:"සීමිත ප්‍රදේශවලට අවසර නොමැතිව ඇතුළුවීම තහනම් කරන්නේ ඇයි?", ak:"사고 위험이 큰 장비나 물질이 있기 때문입니다.", as:"අනතුරුදායක යන්ත්‍ර සූත්‍ර හෝ ද්‍රව්‍ය එහි ඇති බැවිනි."},
            {qk:"출입금지라는 뜻이 무엇인가요?", qs:"ඇතුළුවීම තහනම් (No Entry) යන්නෙහි තේරුම කුමක්ද?", ak:"절대로 들어가면 안 된다는 뜻입니다.", as:"කිසිසේත්ම ඇතුළු නොවිය යුතුය යන්නයි."},
            {qk:"중량물이 무슨 뜻인가요?", qs:"බර ද්‍රව්‍ය (Heavy Load) යනු කුමක්ද?", ak:"아주 무거운 물건을 의미합니다.", as:"ඉතා බරින් යුත් ද්‍රව්‍ය/බඩු බාහිරාදියයි."},
            {qk:"중량물을 들 때 왜 허리를 펴고 다리 힘을 이용해야 할까요?", qs:"බර ද්‍රව්‍ය ඔසවන විට කොන්ද කෙළින් තබා පාදවල ශක්තිය භාවිතා කළ යුත්තේ ඇයි?", ak:"허리 부상을 방지하기 위해서입니다.", as:"කොන්දේ තුවාල සිදුවීම වැළැක්වීමටයි."},
            {qk:"무거운 물건은 어떻게 들어야 하나요?", qs:"බර 물건ක් ඔසවන්නේ කෙසේද?", ak:"무릎을 굽히고 물건을 몸에 붙인 후 다리 힘으로 일어납니다.", as:"දණහිස නමා 물건ය සිරුරට ලං කරගෙන පාදවල ශක්තියෙන් නැගී සිටිය යුතුය."},
            {qk:"운반이 무슨 뜻인가요?", qs:"ප්‍රවාහනය/මාරු කිරීම (Transport) යනු කුමක්ද?", ak:"물건을 옮기는 일입니다.", as:"බඩු බාහිරාදිය වෙනත් ස්ථානයකට 옮기는 ක්‍රියාවලියයි."},
            {qk:"운반기구가 무엇인가요?", qs:"ප්‍රවාහන මෙවලම් යනු මොනවාද?", ak:"손수레(대차), 지게차 등 물건을 옮길 때 쓰는 도구입니다.", as:"අත්කරත්ත, ෆෝක්ලිෆ්ට් වැනි බඩු 옮기기 සඳහා භාවිතා කරන උපකරණ වේ."},
            {qk:"중량물 운반 시 왜 운반기구를 활용해야 할까요?", qs:"බර ද්‍රව්‍ය මාරු කිරීමේදී ප්‍රවාහන මෙවලම් භාවිතා කළ යුත්තේ ඇයි?", ak:"몸의 무리를 줄이고 낙하 사고를 방지하기 위해서입니다.", as:"සිරුරට වන වෙහෙස අඩු කිරීමට සහ බඩු බිම වැටීමේ අනතුරු වැළැක්වීමටයි."},
            {qk:"무거운 물건을 옮길 때는 어떻게 해야 하나요?", qs:"බර 물건ක් වෙනත් ස්ථානයකට ගෙන යන විට කුමක් කළ යුතුද?", ak:"운반기구를 사용하거나 동료와 함께 옮깁니다.", as:"ප්‍රවාහන මෙවලම් භාවිතා කිරීම හෝ සේවකයන් කිහිපදෙනෙකු එක්ව මාරු කිරීම කළ යුතුය."},
            {qk:"이동이 무슨 뜻인가요?", qs:"ගමන් කිරීම/සංචලනය (Movement) යනු කුමක්ද?", ak:"장소를 옮겨 다니는 것입니다.", as:"එක් ස්ථානයක සිට තවත් ස්ථානයකට මාරු වීමයි."},
            {qk:"안전통로가 무엇인가요?", qs:"ආරක්ෂිත මාර්ගය (Safe Walkway) යනු කුමක්ද?", ak:"사람이 안전하게 다닐 수 있도록 정해진 길입니다.", as:"මිනිසුන්ට ආරක්ෂිතව ගමන් කිරීම සඳහා වෙන් කර ඇති මාර්ගයයි."},
            {qk:"이동할 때 왜 안전통로를 이용해야 할까요?", qs:"ගමන් කිරීමේදී ආරක්ෂිත මාර්ග භාවිතා කළ යුත්තේ ඇයි?", ak:"지게차나 장비와의 충돌을 피하기 위해서입니다.", as:"ෆෝක්ලිෆ්ට් හෝ වෙනත් යන්ත්‍රවල හැපීම වැළැක්වීම සඳහායි."},
            {qk:"작업 중이란 무슨 뜻인가요?", qs:"වැඩෙහි යෙදී සිටීම යනු කුමක්ද?", ak:"업무를 수행하고 있는 상태입니다.", as:"තමන්ට නියමිත රාජකාරිය කරමින් සිටින තත්ත්වයයි."},
            {qk:"작업 중에 왜 휴대폰을 사용하면 안 될까요?", qs:"වැඩ කරන අතරතුර ජංගම දුරකථන භාවිතා නොකළ යුත්තේ ඇයි?", ak:"주의력이 떨어져 큰 사고가 날 수 있기 때문입니다.", as:"අවධානය ගිලිහී ගොස් බරපතල අනතුරක් සිදුවිය හැකි බැවිනි."},
            {qk:"정리정돈이 무슨 뜻인가요?", qs:"පිළිවෙලකට තැබීම (Organizing) යනු කුමක්ද?", ak:"주변을 치우고 물건을 바르게 정돈하는 것입니다.", as:"අවට පිරිසිදු කර බඩු බාහිරාදිය නිසි පරිදි සකස් කර තැබීමයි."},
            {qk:"청소가 무슨 뜻인가요?", qs:"පිරිසිදු කිරීම (Cleaning) යනු කුමක්ද?", ak:"더러운 것을 닦고 깨끗하게 치우는 것입니다.", as:"කුණු සහ අපිරිසිදු දෑ පිසදමා පිරිසිදු කිරීමයි."},
            {qk:"작업장에서 정리정돈 및 청소를 왜 해야 할까요?", qs:"වැඩබිම සැමවිටම පිරිසිදුව සහ පිළිවෙලට තැබිය යුත්තේ ඇයි?", ak:"넘어짐 사고를 막고 안전한 환경을 만들기 위해서입니다.", as:"පය පැටලී වැටීම් වළක්වා ගැනීමට සහ ආරක්ෂිත වටපිටාවක් නිර්මාණය කිරීමටයි."},
            {qk:"공구가 무엇인가요?", qs:"මෙවලම් (Tools) යනු මොනවාද?", ak:"일을 할 때 사용하는 연장이나 도구입니다.", as:"වැඩ කිරීම සඳහා භාවිතා කරන ආයුධ හෝ උපකරණ වේ."},
            {qk:"지정된 자리가 무슨 뜻인가요?", qs:"නියමිත ස්ථානය යනු කුමක්ද?", ak:"항상 두기로 약속된 위치입니다.", as:"යම් භාණ්ඩයක් තැබීමට කලින් වෙන් කර ඇති ස්ථිර ස්ථානයයි."},
            {qk:"공구를 왜 지정된 자리에 두어야 할까요?", qs:"මෙවලම් නියමිත ස්ථානයේම තැබිය යුත්තේ ඇයි?", ak:"찾기 쉽고 발에 걸려 넘어지는 것을 막기 위해서입니다.", as:"පහසුවෙන් සොයා ගැනීමට සහ ඒවායේ පය පැටලී වැටීම වැළැක්වීමටයි."},
            {qk:"위생관리가 무슨 뜻인가요?", qs:"සෞඛ්‍යාරක්ෂාව/න්‍සිවිද්‍යාව (Hygiene Management) යනු කුමක්ද?", ak:"몸과 주변을 깨끗하게 유지하는 것입니다.", as:"සිරුර සහ වටපිටාව පිරිසිදුව තබා ගැනීමයි."},
            {qk:"손 씻기 등 위생관리를 왜 해야 할까요?", qs:"අත් සේදීම වැනි සෞඛ්‍යාරක්ෂිත පුරුදු වැදගත් වන්නේ ඇයි?", ak:"질병을 예방하고 건강을 유지하기 위해서입니다.", as:"රෝගවලින් ආරක්ෂා වීමට සහ සෞඛ්‍ය සම්පන්නව සිටීමටයි."},
            {qk:"작업 후 밥 먹기 전에는 무엇을 해야 하나요?", qs:"වැඩ අවසන් වී ආහාර ගැනීමට පෙර කළ යුත්තේ කුමක්ද?", ak:"반드시 손을 깨끗이 씻어야 합니다.", as:"අනිවාර්යයෙන්ම දෑත් පිරිසිදුව සෝදාගත යුතුය."},
            {qk:"청소 및 수리 작업이 무엇인가요?", qs:"පිරිසිදු කිරීම සහ අලුත්වැඩියාව යනු කුමක්ද?", ak:"기계를 관리하고 고치는 일입니다.", as:"යන්ත්‍ර සූත්‍ර නඩත්තු කිරීම සහ දෝෂ සකස් කිරීමයි."},
            {qk:"전원 차단이 무슨 뜻인가요?", qs:"විදුලිය විසන්ධි කිරීම (Power Isolation) යනු කුමක්ද?", ak:"전기 스위치를 끄고 전기를 완전히 끊는 것입니다.", as:"විදුලි ස්විචය නිවා දමා විදුලි සැපයුම සම්පූර්ණයෙන්ම නැවැත්වීමයි."},
            {qk:"청소 및 수리 작업 시 왜 기계 전원을 차단해야 할까요?", qs:"පිරිසිදු කිරීමේදී හෝ අලුත්වැඩියා කිරීමේදී විදුලිය විසන්ධි කළ යුත්තේ ඇයි?", ak:"기계가 갑자기 움직여 발생하는 사고를 막기 위해서입니다.", as:"යන්ත්‍රය හදිසියේ ක්‍රියාත්මක වීමෙන් සිදුවන අනතුරු වැළැක්වීමටයි."},
            {qk:"기계의 청소 및 수리 작업 전에는 무엇을 해야 하나요?", qs:"යන්ත්‍රයක් පිරිසිදු කිරීමට හෝ අලුත්වැඩියා කිරීමට පෙර කළ යුත්තේ කුමක්ද?", ak:"전원을 끄고 '점검 중' 표지판을 걸어야 합니다.", as:"විදුලිය නිවා දමා 'නඩත්තු කරමින් පවතී' (Under Maintenance) යන පුවරුව එල්විය යුතුය."},
            {qk:"화기 취급이 무슨 뜻인가요?", qs:"ගිනි උපකරණ හැසිරවීම යනු කුමක්ද?", ak:"불을 사용하는 작업입니다.", as:"ගින්දර භාවිතයෙන් සිදු කරන වැඩ කටයුතුයි."},
            {qk:"불씨나 불티가 무엇인가요?", qs:"පුළිඟු (Sparks) යනු මොනවාද?", ak:"불이 붙을 수 있는 작은 불꽃입니다.", as:"ගින්නක් හටගත හැකි කුඩා ගිනි කැබලි හෝ සිහින් 불꽃 වේ."},
            {qk:"화기 취급 시 왜 불씨와 불티를 확인해야 할까요?", qs:"ගිනි වැඩවලින් පසු පුළිඟු පරීක්ෂා කළ යුත්තේ ඇයි?", ak:"남은 불씨로 인해 나중에 화재가 날 수 있기 때문입니다.", as:"ඉතිරි වන පුළිඟු නිසා පසුව ගින්නක් හටගත හැකි බැවිනි."},
            {qk:"소화기 사용 시 제일 먼저 해야 하는 일은 무엇인가요?", qs:"ගිනි නිවන උපකරණයක් භාවිතා කිරීමේදී මුලින්ම කළ යුත්තේ කුමක්ද?", ak:"안전핀을 뽑는 것입니다.", as:"එහි ඇති ආරක්ෂිත ඇණය (Safety Pin) ඇද ඉවත් කිරීමයි."},
            {qk:"화재가 무엇인가요?", qs:"ගින්නක්/ගිනි ගැනීමක් යනු කුමක්ද?", ak:"통제할 수 없을 정도로 불이 난 상태입니다.", as:"පාලනය කළ නොහැකි පරිදි ගින්න පැතිරී ඇති තත්ත්වයකි."},
            {qk:"대피가 무슨 뜻인가요?", qs:"මාරුවීම/ඉවත් වීම (Evacuation) යනු කුමක්ද?", ak:"위험한 곳을 피해 안전한 장소로 가는 것입니다.", as:"අනතුරුදායක ස්ථානයෙන් මිදී ආරක්ෂිත ස්ථානයකට යාමයි."},
            {qk:"화재 시 왜 대피가 우선일까요?", qs:"ගින්නක් ඇති වූ විට ඉවත් වීමට මුල් තැන දිය යුත්තේ ඇයි?", ak:"인명 피해를 막는 것이 가장 중요하기 때문입니다.", as:"මිනිස් ජීවිත ආරක්ෂා කර ගැනීම සියල්ලටම වඩා වැදගත් වන බැවිනි."},
            {qk:"119 전화번호가 무엇인가요?", qs:"119 දුරකථන අංකය කුමක්ද?", ak:"화재 및 구조 신고를 위한 긴급 전화번호입니다.", as:"ගිනි ගැනීම් සහ හදිසි ගලවා ගැනීමේ සේවා සඳහා වන හදිසි ඇමතුම් අංකයයි."},
            {qk:"모르는 작업이 무슨 뜻인가요?", qs:"නොදන්නා වැඩක් යනු කුමක්ද?", ak:"작업 방법이나 위험 요소를 잘 모르는 업무입니다.", as:"කරන ආකාරය හෝ එහි ඇති අනතුරු ගැන අවබෝධයක් නැති රාජකාරියකි."},
            {qk:"물어보기가 무슨 뜻인가요?", qs:"විමසීම/ඇසීම යනු කුමක්ද?", ak:"관리자나 동료에게 질문하여 확인하는 것입니다.", as:"සුපරීක්ෂකගෙන් හෝ සගයන්ගෙන් අසා තහවුරු කර ගැනීමයි."},
            {qk:"모르는 작업은 왜 물어보고 해야 할까요?", qs:"නොදන්නා වැඩක් අසා දැනගත යුත්තේ ඇයි?", ak:"실수로 인한 중대 사고를 예방하기 위해서입니다.", as:"වැරදීමකින් සිදුවිය හැකි බරපතල අනතුරු වළක්වා ගැනීමටයි."},
            {qk:"사고 위험이 무슨 뜻인가요?", qs:"අනතුරුදායක තත්ත්වය (Hazard) යනු කුමක්ද?", ak:"사고가 발생할 가능성이 있는 위험한 상태입니다.", as:"අනතුරක් සිදුවීමට ඉඩ ඇති අවදානම් සහගත ස්වභාවයයි."},
            {qk:"발견이 무슨 뜻인가요?", qs:"සොයා ගැනීම/දැකීම යනු කුමක්ද?", ak:"위험 요소를 눈으로 확인하여 찾아내는 것입니다.", as:"අනතුරුදායක දෑ ඇසින් දැක හඳුනා ගැනීමයි."},
            {qk:"사고 위험을 발견했을 때 왜 주변에 알려야 할까요?", qs:"අනතුරක් විය හැකි දෙයක් දුටු විට අවට අයට දැනුම් දිය යුත්තේ ඇයි?", ak:"동료의 사고를 막고 즉시 조치를 취하기 위해서입니다.", as:"සගයන් අනතුරට ලක්වීම වැළැක්වීමට සහ වහාම පියවර ගැනීම සඳහායි."},
            {qk:"폭염이 무슨 뜻인가요?", qs:"දැඩි උෂ්ණත්වය (Extreme Heat) යනු කුමක්ද?", ak:"아주 심한 더위를 의미합니다.", as:"දරාගත නොහැකි තරම් අධික රස්නයයි."},
            {qk:"폭염 시 왜 물, 그늘, 휴식이 필요할까요?", qs:"දැඩි රස්නය ඇති විට ජලය, සෙවන සහ විවේකය අවශ්‍ය වන්නේ ඇයි?", ak:"열사병 등 온열 질환을 예방하기 위해서입니다.", as:"අධික රස්නය නිසා හැදෙන අසනීප (Heat Stroke) වළක්වා ගැනීමටයි."},
            {qk:"날씨가 너무 더우면 어떻게 해야 하나요?", qs:"කාලගුණය අධික ලෙස රත් වූ විට කුමක් කළ යුතුද?", ak:"시원한 물을 자주 마시고 그늘에서 충분히 쉽니다.", as:"සිසිල් ජලය නිතර පානය කර සෙවන ඇති ස්ථානයක ප්‍රමාණවත් ලෙස විවේක ගත යුතුය."},
            {qk:"작업 중지가 무슨 뜻인가요?", qs:"වැඩ නැවැත්වීම (Stop Work) යනු කුමක්ද?", ak:"하던 일을 즉시 멈추는 것입니다.", as:"කරමින් සිටින කාර්යය වහාම නතර කිරීමයි."},
            {qk:"대피가 무슨 뜻인가요?", qs:"ආරක්ෂිතව ඉවත් වීම යනු කුමක්ද?", ak:"안전한 장소로 피하는 것입니다.", as:"බියෙන් තොර ආරක්ෂිත ස්ථානයකට යාමයි."},
            {qk:"사고 위험이 있을 때 왜 작업을 중지하고 대피해야 할까요?", qs:"අනතුරුදායක අවස්ථාවකදී වැඩ නතර කර ඉවත් විය යුත්තේ ඇයි?", ak:"사람의 생명을 보호하는 것이 가장 중요하기 때문입니다.", as:"මිනිස් ජීවිතය ආරක්ෂා කර ගැනීම සියල්ලටම වඩා වැදගත් බැවිනි."},
            {qk:"사고의 위험이 있으면 어떻게 해야 하나요?", qs:"අනතුරක් වීමේ අවදානමක් ඇත්නම් කුමක් කළ යුතුද?", ak:"즉시 일을 멈추고 대피한 후 관리자에게 보고합니다.", as:"වහාම වැඩ නතර කර ආරක්ෂිත ස්ථානයකට ඉවත් වී කළමනාකරුට/සුපරීක්ෂකට 보고 කළ යුතුය."}
        ]
    };

    function startApp(mode) {
        currentMode = mode;
        const colors = { 'time': 'var(--color-time)', 'pure': 'var(--color-pure)', 'sino': 'var(--color-sino)', 'days': 'var(--color-days)', 'math': 'var(--color-math)', 'colors': 'var(--color-colors)', 'safety': 'var(--color-safety)' };
        let titleText = mode === 'safety' ? "ආරක්ෂක ප්‍රශ්න (Safety Q&A)" : mode.toUpperCase().replace('COLORS', 'COLORS (වර්ණ)');
        document.getElementById('mode-title').innerText = titleText;
        document.getElementById('mode-title').style.color = colors[mode];
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('study-page').style.display = 'block';
        generateQuestion();
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('study-page').style.display = 'none';
    }

    function generateQuestion() {
        clickStep = 0;
        const display = document.getElementById('main-display');
        const secondaryDisplay = document.getElementById('secondary-display');
        const answerBox = document.getElementById('answer-display');
        
        secondaryDisplay.style.opacity = "0";
        answerBox.innerText = "ටච් කරන්න";
        answerBox.style.opacity = "0.5";
        answerBox.style.fontSize = "22px";

        if (currentMode === 'math') {
            let a, b, op, result;
            op = Math.random() > 0.5 ? '+' : '-';
            if (op === '+') { a = Math.floor(Math.random() * 20) + 1; b = Math.floor(Math.random() * 10) + 1; }
            else { let tens = [10, 20, 30, 40, 50]; a = tens[Math.floor(Math.random() * tens.length)]; b = Math.floor(Math.random() * 9) + 1; }
            result = op === '+' ? a + b : a - b;
            display.innerText = `${getSino(a)} ${op === '+' ? '더하기' : '빼기'} ${getSino(b)}`;
            display.style.fontSize = "32px";
            currentSecondary = `(${a} ${op} ${b})`;
            currentAnswer = `${getSino(result)} (${result})`;
            
        } else if (currentMode === 'time') {
            display.style.fontSize = "50px";
            let h = Math.floor(Math.random()*12)+1;
            let m = Math.floor(Math.random()*6)*10;
            display.innerText = `${h}:${m===0?'00':m}`;
            currentAnswer = data.hNative[h] + " 시" + (m !== 0 ? " " + getSino(m) + " 분" : "");
            
        } else if (currentMode === 'safety') {
            display.style.fontSize = "24px"; 
            let item = data.safety[Math.floor(Math.random() * data.safety.length)];
            display.innerText = item.qk;
            currentSecondary = item.qs;
            // 2 වන ටච් එකට අදාළ පිළිතුර (කොරියානු + සිංහල)
            currentAnswer = `<div style="color:var(--primary); font-size:22px; margin-bottom:10px;">${item.ak}</div>
                             <div style="color:var(--text-main); font-size:18px;">${item.as}</div>`;
                             
        } else {
            display.style.fontSize = "50px";
            let item = data[currentMode][Math.floor(Math.random() * data[currentMode].length)];
            display.innerText = item.n;
            currentAnswer = item.k;
        }
    }

    function handleBoxClick() {
        const secondaryDisplay = document.getElementById('secondary-display');
        const answerBox = document.getElementById('answer-display');
        
        // Safety සහ Math වලට පමණක් Step 2ක් ඇත
        if ((currentMode === 'math' || currentMode === 'safety') && clickStep === 0) {
            secondaryDisplay.innerHTML = currentSecondary;
            if (currentMode === 'safety') { secondaryDisplay.style.fontSize = "18px"; }
            secondaryDisplay.style.opacity = "1";
            clickStep = 1;
            answerBox.innerText = "පිළිතුර බලන්න ටච් කරන්න";
        } else {
            answerBox.innerHTML = currentAnswer;
            answerBox.style.opacity = "1";
        }
    }

    function openInfo() {
        const info = infoData[currentMode];
        document.getElementById('modalTitle').innerText = info.title;
        document.getElementById('modalDesc').innerText = info.desc;
        const list = document.getElementById('modalList');
        list.innerHTML = "";
        info.uses.forEach(u => { let li = document.createElement("li"); li.innerText = u; list.appendChild(li); });
        document.getElementById('infoModal').style.display = 'flex';
    }

    function closeInfo() { document.getElementById('infoModal').style.display = 'none'; }
    
    document.getElementById('theme-checkbox').addEventListener('change', (e) => {
        document.body.setAttribute('data-theme', e.target.checked ? 'dark' : 'light');
    });
</script>
</body>
</html>
