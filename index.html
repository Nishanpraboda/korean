<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Korean Study Master</title>
    <style>
        /* මූලික පාටවල් (Light Mode) */
        :root {
            --primary: #6c5ce7;
            --secondary: #00b894;
            --bg: #f0f2f5;
            --text-main: #2d3436;
            --text-secondary: #00b894;
            --card-bg: white;
            --dashed-border: #ddd;
            --toggle-active: #fff;
            --toggle-bg: #ccc;
        }

        /* ඩාර්ක් මෝඩ් සඳහා පාටවල් (Dark Mode) */
        [data-theme="dark"] {
            --primary: #8e80ff; /* Lightened primary for dark */
            --bg: #1a1a2e; /* Dark background */
            --text-main: #f0f2f5; /* Light text */
            --text-secondary: #00b894; /* Green is same */
            --card-bg: #2d3436; /* Darker card background */
            --dashed-border: #444; /* Darker border */
            --toggle-active: #1a1a2e; /* Black-ish in toggle */
            --toggle-bg: #444; /* Dark grey for toggle bg */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        #app-container {
            width: 85%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.95);
            background-color: var(--card-bg);
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
            z-index: 2;
            transition: background-color 0.3s;
        }
        
        .menu-btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .menu-btn:active { transform: scale(0.97); }
        
        .card { display: none; }
        
        .display-box {
            min-height: 170px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px dashed var(--dashed-border);
            border-radius: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03); /* subtle bg when dark */
        }
        
        #main-display { font-size: 55px; font-weight: bold; color: var(--text-main); transition: color 0.3s; }
        #answer-display { 
            font-size: 22px; color: var(--text-secondary); font-weight: 600; 
            margin-top: 10px; line-height: 1.4; transition: color 0.3s;
        }
        
        .next-btn { 
            background: var(--secondary); color: white; border: none; 
            padding: 15px; border-radius: 10px; font-size: 16px; 
            font-weight: bold; cursor: pointer; width: 100%; 
        }
        .back-btn { 
            background: transparent; color: #636e72; color: var(--text-main); border: none; 
            padding: 10px; cursor: pointer; margin-top: 10px; 
            text-decoration: underline; font-size: 14px; transition: color 0.3s;
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: #b2bec3;
            color: var(--text-main); opacity: 0.5;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 2;
            transition: color 0.3s, opacity 0.3s;
        }

        /* ටොගල් බටන් එකේ ස්ටයිල් (Toggle Button Style) */
        .theme-toggle-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .theme-switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--toggle-bg);
            transition: .4s;
            border-radius: 34px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: var(--toggle-active);
            transition: .4s;
            border-radius: 50%;
            z-index: 2;
        }

        input:checked + .slider {
            background-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* චන්ද්‍රයා සහ සූර්යයා සලකුණු (Icons) */
        .icon-sun {
            font-size: 16px;
            color: #f1c40f; /* Sun color */
            margin-right: 2px;
            z-index: 1;
        }

        .icon-moon {
            font-size: 16px;
            color: #f1c40f; /* Moon color */
            margin-left: 2px;
            z-index: 1;
        }
    </style>
</head>
<body data-theme="light">

<div class="theme-toggle-container">
    <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider round">
            <span class="icon-sun">&#9728;</span> <span class="icon-moon">&#127769;</span> </div>
    </label>
</div>

<div id="app-container">
    <div id="menu-page">
        <button class="menu-btn" onclick="startApp('time')">වෙලාව කියවමු (Time)</button>
        <button class="menu-btn" onclick="startApp('native')">ගණන් කරමු (Native Korean)</button>
        <button class="menu-btn" onclick="startApp('sino')">අංක සහ ඉලක්කම් (Sino Korean)</button>
    </div>

    <div id="study-page" class="card">
        <h3 id="mode-title" style="color:var(--primary); margin: 0 0 15px 0;">Mode</h3>
        <div class="display-box" onclick="showAnswer()">
            <div id="main-display">?</div>
            <div id="answer-display">ටච් කරන්න</div>
        </div>
        <button class="next-btn" onclick="generateQuestion()">ඊළඟ එක</button>
        <button class="back-btn" onclick="showMenu()">ප්‍රධාන මෙනුවට</button>
    </div>
</div>

<div class="watermark">Korean with leen thilina</div>

<script>
    let currentMode = '';
    let currentAnswer = '';

    const data = {
        native: [
            {n: "1", k: "하나 (Hana)"}, {n: "2", k: "둘 (Dul)"}, {n: "3", k: "셋 (Set)"},
            {n: "4", k: "넷 (Net)"}, {n: "5", k: "다섯 (Daseot)"}, {n: "6", k: "여섯 (Yeoseot)"},
            {n: "7", k: "일곱 (Ilgop)"}, {n: "8", k: "여덟 (Yeodeol)"}, {n: "9", k: "아홉 (Ahop)"}, {n: "10", k: "열 (Yeol)"}
        ],
        sino: [
            {n: "1", k: "일 (Il)"}, {n: "2", k: "이 (I)"}, {n: "3", k: "삼 (Sam)"},
            {n: "4", k: "사 (Sa)"}, {n: "5", k: "오 (O)"}, {n: "6", k: "육 (Yuk)"},
            {n: "7", k: "칠 (Chil)"}, {n: "8", k: "팔 (Pal)"}, {n: "9", k: "구 (Gu)"}, {n: "10", k: "십 (Sip)"}
        ],
        hNative: ["", "한", "두", "세", "네", "다섯", "여섯", "일곱", "여덟", "아홉", "열", "열한", "열두"],
        hEng: ["", "Han", "Du", "Se", "Ne", "Daseot", "Yeoseot", "Ilgop", "Yeodeol", "Ahop", "Yeol", "Yeol-han", "Yeol-du"],
        mSino: {
            10: {k: "십", e: "sip"}, 20: {k: "이십", e: "i-sip"}, 30: {k: "삼십", e: "sam-sip"},
            40: {k: "사십", e: "sa-sip"}, 50: {k: "오십", e: "o-sip"}
        }
    };

    function startApp(mode) {
        currentMode = mode;
        document.getElementById('menu-page').style.display = 'none';
        document.getElementById('study-page').style.display = 'block';
        let titles = { 'time': 'වෙලාව කියවමු', 'native': 'Native Korean', 'sino': 'Sino Korean' };
        document.getElementById('mode-title').innerText = titles[mode];
        generateQuestion();
    }

    function showMenu() {
        document.getElementById('menu-page').style.display = 'block';
        document.getElementById('study-page').style.display = 'none';
    }

    function generateQuestion() {
        let display = document.getElementById('main-display');
        document.getElementById('answer-display').innerText = "ටච් කරන්න";
        document.getElementById('answer-display').style.color = "#b2bec3";

        if (currentMode === 'native' || currentMode === 'sino') {
            let list = data[currentMode];
            let item = list[Math.floor(Math.random() * list.length)];
            display.innerText = item.n;
            currentAnswer = item.k;
        } 
        else if (currentMode === 'time') {
            let hour = Math.floor(Math.random() * 12) + 1;
            let minute = Math.floor(Math.random() * 6) * 10;
            display.innerText = `${hour}:${minute === 0 ? '00' : minute}`;
            
            let korPart = data.hNative[hour] + " 시";
            let engPart = data.hEng[hour] + " si";

            if (minute === 30) {
                korPart += " 반";
                engPart += " ban";
            } else if (minute !== 0) {
                korPart += " " + data.mSino[minute].k + " 분";
                engPart += " " + data.mSino[minute].e + " bun";
            }
            currentAnswer = korPart + "<br>(" + engPart + ")";
        }
    }

    function showAnswer() {
        document.getElementById('answer-display').innerHTML = currentAnswer;
        document.getElementById('answer-display').style.color = "var(--text-secondary)";
    }

    // මෝඩ්ස් මාරු කරන ජාවාස්ක්‍රිප්ට් එක (Dark/Light Switch JS)
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
    const currentTheme = localStorage.getItem('theme');

    if (currentTheme) {
        document.body.setAttribute('data-theme', currentTheme);
        if (currentTheme === 'dark') {
            toggleSwitch.checked = true;
        }
    }

    function switchTheme(e) {
        if (e.target.checked) {
            document.body.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
        }
        else {
            document.body.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
        }    
    }

    toggleSwitch.addEventListener('change', switchTheme, false);
</script>
</body>
</html>
